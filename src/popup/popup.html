<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ぺたりん</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Yusei+Magic&family=Zen+Maru+Gothic:wght@400;500;700;900&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <div class="grain" aria-hidden="true"></div>

    <header class="topbar">
      <div class="tape" aria-hidden="true"></div>
      <div class="brand">
        <span class="logo-mark" aria-hidden="true">
          <span class="logo-note"></span>
        </span>
        <div class="brand-text">
          <h1>ぺたりん</h1>
          <p>このドメインに、ぺたり。</p>
        </div>
      </div>
      <div class="count-badge" id="totalBadge" title="保存中の付箋の合計">0</div>
    </header>

    <main>
      <!-- 設定カード -->
      <section class="card settings">
        <h2 class="card-title">どの端に貼る？</h2>

        <div class="side-picker">
          <div class="browser-mock" id="sidePicker">
            <div class="mock-bar">
              <i></i><i></i><i></i>
              <div class="mock-url"></div>
            </div>
            <div class="mock-screen">
              <button class="zone zone-top" data-side="top" aria-label="上に並べる"></button>
              <button class="zone zone-right" data-side="right" aria-label="右に並べる"></button>
              <button class="zone zone-bottom" data-side="bottom" aria-label="下に並べる"></button>
              <button class="zone zone-left" data-side="left" aria-label="左に並べる"></button>
              <span class="mock-hint">画面の端を選んでね</span>
            </div>
          </div>
        </div>

        <label class="switch-row">
          <span class="switch-label">
            格納中は半透明にする
            <small>マウスを乗せると、はっきり表示</small>
          </span>
          <span class="switch">
            <input type="checkbox" id="translucentToggle" />
            <span class="track"><span class="thumb"></span></span>
          </span>
        </label>

        <label class="switch-row">
          <span class="switch-label">
            ページ上に付箋を表示
            <small>オフにすると、このポップアップだけで管理</small>
          </span>
          <span class="switch">
            <input type="checkbox" id="showOnPageToggle" />
            <span class="track"><span class="thumb"></span></span>
          </span>
        </label>
      </section>

      <!-- 付箋デスク（フルページ管理タブ）への入口 -->
      <button class="open-desk" id="openDesk" type="button">
        <span class="od-ico" aria-hidden="true">🗂</span>
        <span class="od-text">
          付箋デスクを開く
          <small>全サイトの付箋を別タブでまとめて整理</small>
        </span>
        <span class="od-arrow" aria-hidden="true">↗</span>
      </button>

      <!-- 検索（このドメイン周辺をさっと探す）-->
      <div class="search">
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <circle cx="11" cy="11" r="7" /><line x1="16.5" y1="16.5" x2="21" y2="21" />
        </svg>
        <input type="search" id="searchInput" placeholder="付箋やドメインを探す…" autocomplete="off" />
      </div>

      <!-- 付箋一覧 -->
      <section id="list" class="list"></section>

      <!-- 空状態 -->
      <div id="empty" class="empty" hidden>
        <div class="empty-art" aria-hidden="true">
          <span class="empty-note">＋</span>
        </div>
        <p class="empty-title">まだ付箋はないみたい</p>
        <p class="empty-sub">気になるページを開いて、端の「＋」から<br />最初の一枚をぺたりと貼ってみて。</p>
      </div>
    </main>

    <footer class="foot">
      <span id="footCount">0 枚の付箋</span>
      <span class="foot-dot">·</span>
      <span class="foot-name">ぺたりん</span>
    </footer>

    <script type="module" src="popup.js"></script>
  </body>
</html>
