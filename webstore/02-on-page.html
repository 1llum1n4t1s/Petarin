<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Yusei+Magic&family=Zen+Maru+Gothic:wght@400;500;700;900&display=swap" rel="stylesheet" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 1280px; height: 800px; overflow: hidden; }
    body {
      font-family: "Zen Maru Gothic", "Yu Gothic UI", system-ui, sans-serif; color: #3a322a;
      background: radial-gradient(circle at 8% -6%, #faf3e4, transparent 40%),
        radial-gradient(circle at 100% 108%, #ead9bd, transparent 44%), #efe6d1;
      position: relative; display: flex; flex-direction: column; align-items: center;
    }
    .head { text-align: center; padding: 40px 0 18px; position: relative; z-index: 2; }
    .head h1 { font-family: "Yusei Magic", sans-serif; font-weight: 400; font-size: 40px; color: #4d3f31; }
    .head h1 .hl { color: #d98a1e; }
    .head p { font-size: 18px; color: #6b5d4d; margin-top: 8px; }

    /* ブラウザ窓モック */
    .browser {
      width: 1130px; height: 560px; background: #fff; border-radius: 16px 16px 12px 12px;
      box-shadow: 0 30px 60px -18px rgba(74, 56, 30, 0.42); overflow: hidden; position: relative;
    }
    .bar { height: 46px; background: linear-gradient(180deg, #f3ece1, #e9e0d0); display: flex; align-items: center;
      gap: 8px; padding: 0 16px; border-bottom: 1px solid #ddd2bd; }
    .dot { width: 12px; height: 12px; border-radius: 50%; }
    .url { flex: 1; margin-left: 12px; height: 26px; background: #fff; border-radius: 999px; border: 1px solid #e0d6c4;
      display: flex; align-items: center; padding: 0 14px; font-size: 13px; color: #8a7d6d; }
    .page { position: relative; height: calc(560px - 46px); padding: 40px 56px; background:
      linear-gradient(#ffffff, #fcfaf6); }
    .page h2 { font-size: 30px; color: #2c2622; margin-bottom: 8px; font-weight: 900; }
    .page .meta { font-size: 13px; color: #aa9f8d; margin-bottom: 26px; }
    .page .ln { height: 13px; border-radius: 6px; background: #ece6db; margin: 13px 0; }
    .page .ln.s { width: 62%; } .page .ln.m { width: 86%; } .page .ln.l { width: 95%; }
    .page .img { height: 120px; width: 60%; border-radius: 12px; margin: 22px 0;
      background: linear-gradient(120deg, #dfeaf3, #e7dff1); }

    /* 付箋レール（右端・rail.css の見た目を再現） */
    .rail { position: absolute; right: 0; top: 0; bottom: 0; width: 0; }
    .note { position: absolute; right: 0; height: 34px; width: 32px; border-radius: 3px 0 0 3px;
      display: flex; align-items: center; justify-content: center; font-size: 16px; color: var(--ink);
      background-image: linear-gradient(150deg, color-mix(in srgb, var(--p) 90%, #fff), var(--p) 55%,
        color-mix(in srgb, var(--p) 82%, #000 8%));
      box-shadow: 0 1px 1.5px rgba(48, 31, 7, 0.18), 0 8px 16px -8px rgba(38, 24, 5, 0.5),
        inset 0 1px 0 rgba(255, 255, 255, 0.6); }
    .note::after { content: ""; position: absolute; left: 0; top: 1px; bottom: 1px; width: 5px; border-radius: 2px;
      background: linear-gradient(to right, rgba(255, 255, 255, 0.95), color-mix(in srgb, var(--d) 94%, #fff) 35%,
        color-mix(in srgb, var(--d) 86%, #000 6%) 66%, color-mix(in srgb, var(--d) 52%, #000 30%)); }
    .note.open { width: 312px; height: 44px; border-radius: 9px 0 0 9px; justify-content: flex-start;
      padding-left: 16px; gap: 10px; font-size: 15px; font-weight: 700;
      box-shadow: 0 2px 4px rgba(48, 31, 7, 0.2), 0 18px 30px -10px rgba(38, 24, 5, 0.5); z-index: 5; }
    .note.open .txt { flex: 1; white-space: nowrap; overflow: hidden; }
    .note.open .btns { display: flex; gap: 6px; }
    .note.open .b { width: 22px; height: 22px; border-radius: 50%; background: rgba(70, 40, 20, 0.16);
      display: grid; place-items: center; font-size: 11px; }
  </style>
</head>
<body>
  <div class="head">
    <h1>見ているページの端から、<span class="hl">そっと。</span></h1>
    <p>付箋はドメインに紐づいて画面の端に貼り付き、ふだんは小さく格納。じゃまをしません。</p>
  </div>

  <div class="browser">
    <div class="bar">
      <span class="dot" style="background:#ff6159"></span>
      <span class="dot" style="background:#ffbd2e"></span>
      <span class="dot" style="background:#28c840"></span>
      <span class="url">🔒 example.com/article/how-to-read-the-web</span>
    </div>
    <div class="page">
      <h2>長い記事も、メモと一緒に。</h2>
      <div class="meta">example.com · 6 分で読めます</div>
      <div class="ln l"></div><div class="ln m"></div><div class="ln s"></div>
      <div class="img"></div>
      <div class="ln l"></div><div class="ln m"></div><div class="ln l"></div><div class="ln s"></div>

      <div class="rail">
        <!-- 展開中の付箋 -->
        <div class="note open" style="--p:#FFE57A; --d:#F2C84B; --ink:#5C4A1E; top:64px;">
          <span class="txt">あとで読む：3 章のグラフが重要</span>
          <span class="btns"><span class="b">✎</span><span class="b">✕</span></span>
        </div>
        <!-- 格納中のタブ（絵文字表示） -->
        <div class="note" style="--p:#A6E6D5; --d:#73D0BB; --ink:#1C5247; top:150px;">🍀</div>
        <div class="note" style="--p:#FFB6C9; --d:#F58FAC; --ink:#6E2A40; top:198px;">🌸</div>
        <div class="note" style="--p:#A9D6F5; --d:#79B9ED; --ink:#1F4A6E; top:246px;">⭐</div>
        <!-- ＋作成タブ -->
        <div class="note" style="--p:#F6D873; --d:#D8A93A; --ink:#6B531A; top:330px; font-weight:700;">＋</div>
      </div>
    </div>
  </div>
</body>
</html>
