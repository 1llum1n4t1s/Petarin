name: Publish to Chrome Web Store + Firefox AMO

on:
  push:
    branches:
      - 'release/**'

permissions:
  contents: read

jobs:
  package:
    name: ZIP パッケージ作成
    runs-on: ubuntu-latest
    outputs:
      # version を後続 job (publish / publish-firefox) の pre-flight check に渡す。
      # 同 version が既に CWS / AMO に存在する場合、publish step を skip して
      # 「同 version 重複 push 拒否」エラーを未然に防ぐ。
      version: ${{ steps.version.outputs.version }}
    steps:
      # サプライチェーン対策で Actions は SHA ピン留め。Dependabot (.github/dependabot.yml) が
      # SHA + タグコメント形式の更新 PR を自動生成するので、それをマージして最新化する運用。
      - name: リポジトリをチェックアウト
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.0
        with:
          # 本 workflow は GITHUB_TOKEN での git push をしないので、.git/config に書き残さない
          persist-credentials: false

      - name: バージョンを取得
        id: version
        run: |
          version=$(grep -oP '(?<="version": ")[^"]+' manifest.json)
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "📦 公開対象バージョン: $version"

      - name: ブランチ名とバージョンの整合性を確認
        env:
          BRANCH_VERSION: ${{ github.ref_name }}
          MANIFEST_VERSION: ${{ steps.version.outputs.version }}
        run: |
          expected="release/${MANIFEST_VERSION}"
          if [ "$BRANCH_VERSION" != "$expected" ]; then
            echo "::error::ブランチ名 ($BRANCH_VERSION) と manifest.json のバージョン ($MANIFEST_VERSION) が一致しません。期待値: $expected"
            exit 1
          fi
          echo "✅ ブランチ名と manifest バージョン一致: $expected"

      - name: pnpm セットアップ
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          version: 11

      - name: Node セットアップ
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.0.0
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: 依存インストール
        # frozen-lockfile は lockfile を迂回した最新依存取得を禁止し、サプライチェーン攻撃の
        # 経路を塞ぐ。lockfile が古い場合は CI を失敗させ、開発者に更新を促す。
        run: pnpm install --frozen-lockfile

      - name: アイコン生成
        run: node scripts/generate-icons.js

      - name: zip パッケージを作成
        run: |
          # _locales/ は manifest.json の default_locale 参照先 (ja/en の messages.json)。
          # 含めないと CWS の Submit for review で `PKG_DEFAULT_LOCALE_MISSING` エラー。
          zip -r petarin-chrome.zip manifest.json icons src _locales \
            -x "*.DS_Store" "*.swp" "*~"
          ls -lh petarin-chrome.zip

      - name: ZIP artifact を保存
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: petarin-zip
          path: petarin-chrome.zip
          if-no-files-found: error

      - name: Firefox 用ソースディレクトリを構築
        # manifest.firefox.json を manifest.json として配置し、icons / src / _locales を同梱。
        # background は service_worker ではなく scripts (type: module) で記述済み (Firefox MV3)。
        # offscreen / tabCapture 等の Firefox 非対応 API は使っていないので strip 不要。
        # web-ext sign は zip ではなく source-dir を受け取って自身で xpi を構築するため、
        # ここでは source dir のまま保存する。
        run: |
          mkdir -p firefox-build
          cp manifest.firefox.json firefox-build/manifest.json
          cp -r icons firefox-build/
          cp -r src firefox-build/
          cp -r _locales firefox-build/
          find firefox-build \( -name "*.DS_Store" -o -name "*.swp" -o -name "*~" \) -delete
          echo "📂 firefox-build 内容:"
          ls -la firefox-build/

      - name: Firefox source artifact を保存
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: petarin-firefox-source
          path: firefox-build/
          if-no-files-found: error

  publish:
    name: Chrome Web Store にアップロード + Submit for review
    runs-on: ubuntu-latest
    needs: package
    steps:
      - name: ZIP artifact を取得
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: petarin-zip
          path: .

      - name: バージョン pre-flight check (CWS / 既存 version と一致なら skip)
        # 同 version 再 push は CWS API が拒否するため、Items.get API で draft の crxVersion を取得して
        # manifest version と一致したら publish を skip する。crxVersion は未文書フィールドだが
        # 実機で安定して返るのを確認済み。消えたら空 → skip=false 側 (publish 実行) に倒れて安全。
        # uploadState は FAILURE のときのみ skip しない (再 upload したいケース)。
        id: cws-preflight
        env:
          CWS_CLIENT_ID: ${{ secrets.CWS_CLIENT_ID }}
          CWS_CLIENT_SECRET: ${{ secrets.CWS_CLIENT_SECRET }}
          CWS_REFRESH_TOKEN: ${{ secrets.CWS_REFRESH_TOKEN }}
          CWS_EXTENSION_ID: ${{ secrets.CWS_EXTENSION_ID }}
          MANIFEST_VERSION: ${{ needs.package.outputs.version }}
        run: |
          set -euo pipefail
          shopt -s inherit_errexit
          token_response=$(curl -fsS \
            -X POST "https://oauth2.googleapis.com/token" \
            --data-urlencode "client_id=${CWS_CLIENT_ID}" \
            --data-urlencode "client_secret=${CWS_CLIENT_SECRET}" \
            --data-urlencode "refresh_token=${CWS_REFRESH_TOKEN}" \
            --data-urlencode "grant_type=refresh_token")
          access_token=$(python3 -c 'import json,sys; print(json.load(sys.stdin)["access_token"])' 2>/dev/null <<< "$token_response" || echo "")
          if [ -z "${access_token:-}" ]; then
            echo "::warning::CWS pre-flight: OAuth token 取得失敗 → publish step に判定を委ねる"
            echo "skip=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "::add-mask::${token_response}"
          echo "::add-mask::${access_token}"
          draft_response=$(curl -fsS \
            -H "Authorization: Bearer ${access_token}" \
            -H "x-goog-api-version: 2" \
            "https://www.googleapis.com/chromewebstore/v1.1/items/${CWS_EXTENSION_ID}?projection=DRAFT") || draft_response=""
          if [ -z "$draft_response" ]; then
            echo "::warning::CWS pre-flight: Items.get 失敗 → publish step に判定を委ねる"
            echo "skip=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          draft_version=$(python3 -c 'import json,sys; d=json.load(sys.stdin); print(d.get("crxVersion",""))' 2>/dev/null <<< "$draft_response" || echo "")
          draft_state=$(python3 -c 'import json,sys; d=json.load(sys.stdin); print(d.get("uploadState",""))' 2>/dev/null <<< "$draft_response" || echo "")
          echo "📊 CWS draft: version=${draft_version:-(unknown)} state=${draft_state:-(unknown)} / manifest: ${MANIFEST_VERSION}"
          if [ -n "$draft_version" ] && [ "$draft_version" = "$MANIFEST_VERSION" ] && [ "$draft_state" != "FAILURE" ]; then
            echo "::notice::CWS は既に v${MANIFEST_VERSION} を保持 (crxVersion 一致, uploadState=${draft_state})。CWS publish step を skip (同 version 重複 push 防止)"
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Chrome Web Store にアップロード + Publish API で Submit for review
        if: ${{ steps.cws-preflight.outputs.skip != 'true' }}
        env:
          CWS_CLIENT_ID: ${{ secrets.CWS_CLIENT_ID }}
          CWS_CLIENT_SECRET: ${{ secrets.CWS_CLIENT_SECRET }}
          CWS_REFRESH_TOKEN: ${{ secrets.CWS_REFRESH_TOKEN }}
          CWS_EXTENSION_ID: ${{ secrets.CWS_EXTENSION_ID }}
        run: |
          # フルオート申請: 1) ZIP を Draft アップロード → 2) Publish API で Submit for review。
          # listing 項目 (説明 / スクショ / カテゴリ) は CWS API に更新口が無いので、変更したい
          # リリースでは push 前後に Dashboard で listing を整えてから release ブランチを push する。
          # stdout/stderr は直接ストリームし、Actions のマスキングに Bearer Token を `***` 置換させる。
          # inherit_errexit を command substitution の前に有効化し、token 取得 curl も errexit 保護する。
          set -euo pipefail
          shopt -s inherit_errexit
          # ⚠️ このブロックでは `set -x` を絶対に有効化しない (トークン取得行が add-mask 前に平文化する)。
          token_response=$(curl -fsS \
            -X POST "https://oauth2.googleapis.com/token" \
            --data-urlencode "client_id=${CWS_CLIENT_ID}" \
            --data-urlencode "client_secret=${CWS_CLIENT_SECRET}" \
            --data-urlencode "refresh_token=${CWS_REFRESH_TOKEN}" \
            --data-urlencode "grant_type=refresh_token")
          access_token=$(python3 -c 'import json,sys; print(json.load(sys.stdin)["access_token"])' 2>/dev/null <<< "$token_response" || echo "")
          if [ -z "${access_token:-}" ]; then
            echo "::error::access_token のパースに失敗しました (OAuth refresh response が想定形式でない可能性)"
            exit 1
          fi
          echo "::add-mask::${token_response}"
          echo "::add-mask::${access_token}"

          # ----- ステップ 1: ZIP を Draft としてアップロード -----
          echo "📤 Step 1/2: Chrome Web Store に ZIP をアップロード中..."
          upload_response=$(curl -fsS \
            -X PUT \
            -H "Authorization: Bearer ${access_token}" \
            -H "x-goog-api-version: 2" \
            -H "Content-Type: application/zip" \
            --data-binary @petarin-chrome.zip \
            "https://www.googleapis.com/upload/chromewebstore/v1.1/items/${CWS_EXTENSION_ID}")
          echo "✅ アップロード完了"
          upload_state=$(python3 -c 'import json,sys; d=json.load(sys.stdin); print(d.get("uploadState","UNKNOWN"))' 2>/dev/null <<< "$upload_response")
          echo "📊 uploadState: ${upload_state}"
          if [ "$upload_state" != "SUCCESS" ]; then
            echo "::error::アップロードが SUCCESS ではないため publish を中止します (state=${upload_state})"
            echo "Response: $upload_response"
            exit 1
          fi

          # ----- ステップ 2: Publish API で Submit for review -----
          echo "📨 Step 2/2: Publish API で Submit for review..."
          publish_response=$(curl -fsS \
            -X POST \
            -H "Authorization: Bearer ${access_token}" \
            -H "x-goog-api-version: 2" \
            -H "Content-Length: 0" \
            "https://www.googleapis.com/chromewebstore/v1.1/items/${CWS_EXTENSION_ID}/publish?publishTarget=default")
          publish_status=$(python3 -c 'import json,sys; d=json.load(sys.stdin); print(",".join(d.get("status",[])))' 2>/dev/null <<< "$publish_response")
          echo "📊 Publish status: ${publish_status}"
          case "$publish_status" in
            *OK*|*ITEM_PENDING_REVIEW*)
              echo "🎉 Submit for review 完了！Chrome Web Store のレビューキューに入りました"
              echo "🔗 Dashboard: https://chrome.google.com/webstore/devconsole"
              echo "⏰ レビュー結果は通常 1〜数日でメール通知"
              ;;
            *)
              echo "::error::予期しない publish status: ${publish_status}"
              echo "Response: $publish_response"
              exit 1
              ;;
          esac

  publish-firefox:
    name: Firefox AMO に submission
    runs-on: ubuntu-latest
    needs: package
    # Chrome publish が失敗 (同 version 重複 upload 等) しても Firefox AMO は独立 submit する。
    # `if: success() || failure()` がないと「Chrome 失敗 → Firefox AMO 連鎖 skip」でリカバリーが
    # 機能しなくなる (cancelled() 時のみ skip)。
    if: ${{ success() || failure() }}
    steps:
      - name: リポジトリをチェックアウト
        # web-ext は devDependencies なので package.json + lockfile が必要 (pnpm install で取得)
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.0
        with:
          persist-credentials: false

      - name: Firefox source artifact を取得
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: petarin-firefox-source
          path: firefox-build/

      - name: pnpm セットアップ
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          version: 11

      - name: Node セットアップ
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.0.0
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: web-ext 依存インストール
        # web-ext は package.json pin、pnpm install --frozen-lockfile で integrity 検証。
        run: pnpm install --frozen-lockfile

      - name: バージョン pre-flight check (AMO / 既 submission 済み version なら skip)
        # 同 version 重複 submission は AMO が "Version already exists" で拒否するため、AMO API v5
        # versions list (anonymous GET 可) で manifest version の存在を確認して skip。
        # /versions/ は public listed (承認済み) のみ返すため、pending を取りこぼした場合は submit
        # step 側の "version already exists" warning 降格 fallback で救済する。
        # AMO_SLUG は vava.config.json から jq 抽出して SSOT 化。
        id: amo-preflight
        env:
          MANIFEST_VERSION: ${{ needs.package.outputs.version }}
        run: |
          set -euo pipefail
          shopt -s inherit_errexit
          AMO_SLUG=$(jq -r '.amo.slug // empty' vava.config.json 2>/dev/null || echo "")
          if [ -z "${AMO_SLUG:-}" ]; then
            echo "::warning::vava.config.json の amo.slug が取得できないため AMO pre-flight を skip (publish step に委ねる)"
            echo "skip=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          versions_response=$(curl -fsS \
            -H "Accept: application/json" \
            -H "User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36" \
            "https://addons.mozilla.org/api/v5/addons/addon/${AMO_SLUG}/versions/") || versions_response=""
          if [ -z "$versions_response" ]; then
            echo "::warning::AMO pre-flight: versions list 取得失敗 (初回登録 / 一時障害) → publish step に判定を委ねる"
            echo "skip=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          exists=$(MANIFEST_VERSION="$MANIFEST_VERSION" python3 -c 'import json,sys,os; target=os.environ["MANIFEST_VERSION"]; data=json.load(sys.stdin); print("1" if any(v.get("version")==target for v in data.get("results",[])) else "0")' 2>/dev/null <<< "$versions_response" || echo "")
          echo "📊 AMO versions check: target=${MANIFEST_VERSION} / exists=${exists:-(parse失敗)}"
          if [ "$exists" = "1" ]; then
            echo "::notice::AMO に既に v${MANIFEST_VERSION} の submission が存在するため AMO publish step を skip (同 version 重複 submission 防止)"
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Firefox AMO に submit (web-ext sign --channel=listed)
        if: ${{ steps.amo-preflight.outputs.skip != 'true' }}
        # web-ext 10+ では submission API がデフォルト動作。`--channel=listed` で AMO 公開
        # (人間レビュー入り)。submission 受付完了で job 成功扱い。実際の反映はレビュー通過後。
        env:
          # AMO API キー (JWT issuer / secret)。GitHub Secrets に設定:
          # gh secret set AMO_JWT_ISSUER / gh secret set AMO_JWT_SECRET
          WEB_EXT_API_KEY: ${{ secrets.AMO_JWT_ISSUER }}
          WEB_EXT_API_SECRET: ${{ secrets.AMO_JWT_SECRET }}
        run: |
          if [ -z "$WEB_EXT_API_KEY" ] || [ -z "$WEB_EXT_API_SECRET" ]; then
            echo "::error::AMO_JWT_ISSUER / AMO_JWT_SECRET の GitHub Secrets が未設定です"
            echo "  JWT 発行: https://addons.mozilla.org/ja/developers/addon/api/key/"
            echo "  登録: gh secret set AMO_JWT_ISSUER / gh secret set AMO_JWT_SECRET"
            exit 1
          fi
          # pnpm exec で frozen-lockfile install 済みのローカル版を呼ぶ。--source-dir は package job が
          # 構築した firefox-build/。--amo-metadata=.amo-metadata.json で version.license: "MIT" を
          # 毎回 submission に含める (AMO API v5 は各 version 提出時に license 明示必須)。
          # `web-ext sign --channel=listed` は AMO の auto-sign を待たず 15 分で timeout exceeded を
          # 返して exit 1 になる既知挙動。submission 自体は受理済みなので warning 扱いで exit 0 化する。
          set +e
          pnpm exec web-ext sign \
            --source-dir=firefox-build \
            --artifacts-dir=web-ext-artifacts \
            --channel=listed \
            --amo-metadata=.amo-metadata.json 2>&1 | tee /tmp/web-ext.log
          rc=${PIPESTATUS[0]}
          set -e
          if [ "$rc" -ne 0 ]; then
            if grep -q "Approval: timeout exceeded" /tmp/web-ext.log; then
              echo "::warning::web-ext sign が timeout exceeded で exit 1 を返したが submission は AMO に受理済み。CI green 化のため exit 0 扱いに変換します"
            elif grep -qiE "version (already exists|conflict)" /tmp/web-ext.log; then
              echo "::warning::AMO に既に同 version が存在するため version conflict で fail (pre-flight が pending submission を検知できないケース)。CI green 化のため exit 0 扱いに変換します"
            else
              echo "::error::web-ext sign が timeout exceeded / version conflict 以外の理由で失敗しました (rc=$rc)。ログ確認要"
              exit "$rc"
            fi
          fi
          echo "🦊 Firefox AMO への submission 送信完了 (レビュー待ち)"
          echo "🔗 AMO Developer Hub: https://addons.mozilla.org/developers/"
          echo "⏰ レビュー結果は通常 1〜数日でメール通知"
